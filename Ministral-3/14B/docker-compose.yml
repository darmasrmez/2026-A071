version: '3.9'

name: 2026-A071_Ministral-3_14B

services:
  Ministral-3-fine-tuning:
    build:
      context: .
      dockerfile: Ministral-3-14B.Dockerfile
    ipc: host
    devices:
      - /dev/kfd:/dev/kfd
      - /dev/dri:/dev/dri
    volumes:
      - ./:/app:z
      - /sys:/sys:ro
    networks:
      - backend

  prometheus:
    image: prom/prometheus:main-distroless
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:z
      - ./metrics:/prometheus:z
    networks:
      - backend
    command:
      - '--storage.tsdb.path=/prometheus'

  node_exporter:
    image: prom/node-exporter:v1-distroless
    container_name: node_exporter
    ports:
      - "9100:9100"
    volumes:
      - /sys:/sys:ro
    networks:
      - backend

  amd_dme:
    container_name: amd_dme
    image: rocm/device-metrics-exporter:v1.4.2
    ports:
      - "5000:5000"
    devices:
      - /dev/kfd:/dev/kfd
      - /dev/dri:/dev/dri
    volumes:
      - /sys:/sys:ro
    networks:
      - backend

  grafana:
    image: grafana/grafana-oss:12.4.2
    ports:
      - "3000:3000"
    user: "${UID}"
    volumes:
      - ./grafana:/var/lib/grafana:z
    networks:
      - backend

networks:
  backend:
    driver: bridge
